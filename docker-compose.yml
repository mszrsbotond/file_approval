services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend/app:/app
      - pdf_storage:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata:
  pdf_storage: